<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Folder - Voice Auth</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Login View -->
        <section id="login-view" class="view active">
            <div class="glass-card">
                <div class="shield-icon">🛡️</div>
                <h1>Secure Folder</h1>
                <p class="subtitle">Voice Authentication Required</p>
                <div class="input-group">
                    <label for="login-id">User ID</label>
                    <input type="text" id="login-id" placeholder="Enter your ID" autocomplete="off">
                </div>
                <div class="voice-auth-container">
                    <button id="login-voice-btn" class="glow-btn">
                        <span class="mic-icon">🎤</span> Authenticate with Voice
                    </button>
                    <div id="login-recording-indicator" class="recording-indicator hidden">
                        <div class="pulse-ring"></div>
                        <span>Listening...</span>
                    </div>
                </div>
                <p class="status-msg" id="login-status"></p>
                <div class="link-container">
                    <a href="#" id="link-to-register">Register new user</a>
                </div>
            </div>
        </section>

        <!-- Registration View -->
        <section id="register-view" class="view hidden">
            <div class="glass-card">
                <h2>Register User</h2>
                <div class="input-group">
                    <label for="reg-id">User ID</label>
                    <input type="text" id="reg-id" placeholder="Choose an ID" autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="reg-pin">Security PIN</label>
                    <input type="password" id="reg-pin" placeholder="Enter master PIN">
                </div>
                <div class="voice-auth-container">
                    <button id="reg-voice-btn" class="glow-btn">
                        <span class="mic-icon">🎤</span> Record Voice Sample
                    </button>
                    <div id="reg-recording-indicator" class="recording-indicator hidden">
                        <div class="pulse-ring"></div>
                        <span>Recording sample...</span>
                    </div>
                </div>
                <button id="submit-register-btn" class="primary-btn" disabled>Register</button>
                <p class="status-msg" id="reg-status"></p>
                <div class="link-container">
                    <a href="#" id="link-to-login">Back to Login</a>
                </div>
            </div>
        </section>

        <!-- Dashboard View -->
        <section id="dashboard-view" class="view hidden">
            <header class="dashboard-header glass-panel">
                <h2>Secure Folder</h2>
                <div class="user-info">
                    <span id="current-user"></span>
                    <button id="logout-btn" class="text-btn">Logout</button>
                </div>
            </header>
            
            <main class="dashboard-content">
                <div class="upload-area glass-card" id="upload-zone">
                    <div class="upload-icon">☁️</div>
                    <h3>Add File to Secure Folder</h3>
                    <p>Drag & drop or click to browse</p>
                    <input type="file" id="file-input" class="hidden" multiple accept="image/*, .pdf, .doc, .docx">
                </div>

                <div class="gallery-section">
                    <h3>Secure Files</h3>
                    <div class="gallery-grid" id="gallery-grid">
                        <!-- Uploaded items will appear here -->
                    </div>
                </div>
            </main>
        </section>

        <!-- Image/Document Lightbox Modal -->
        <div id="file-modal" class="modal hidden">
            <span class="close-modal" id="close-modal-btn">&times;</span>
            <div class="modal-content" id="modal-content">
                <!-- Content injected via JS -->
            </div>
            <div id="modal-caption" class="modal-caption"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
